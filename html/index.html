<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>网页框架</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- 导航栏 -->
    <nav class="navbar">
        <div class="nav-container">
            <div class="nav-logo">
                <a href="#home">Logo</a>
            </div>
            <div class="nav-menu" id="nav-menu">
                <a href="#home" class="nav-link">首页</a>
                <a href="#about" class="nav-link">关于</a>
                <a href="#services" class="nav-link">服务</a>
                <a href="#contact" class="nav-link">联系</a>
            </div>
            <div class="nav-toggle" id="nav-toggle">
                <span class="bar"></span>
                <span class="bar"></span>
                <span class="bar"></span>
            </div>
        </div>
    </nav>

    <!-- 主要内容区域 -->
    <main class="main-content">
        <!-- 首页部分 -->
        <section id="home" class="hero">
            <div class="container">
                <div class="hero-content">
                    <h1 class="hero-title">欢迎标题</h1>
                    <p class="hero-description">描述内容</p>
                    <div class="hero-buttons">
                        <a href="#about" class="btn btn-primary">了解更多</a>
                        <a href="#contact" class="btn btn-secondary">联系我们</a>
                    </div>
                </div>
            </div>
        </section>

        <!-- 关于部分 -->
        <section id="about" class="about">
            <div class="container">
                <h2 class="section-title">关于我们</h2>
                <div class="about-content">
                    <div class="about-text">
                        <p>关于内容</p>
                    </div>
                </div>
            </div>
        </section>

        <!-- 服务部分 -->
        <section id="services" class="services">
            <div class="container">
                <h2 class="section-title">我们的服务</h2>
                <div class="services-grid">
                    <div class="service-card">
                        <h3>服务1</h3>
                        <p>服务描述</p>
                    </div>
                    <div class="service-card">
                        <h3>服务2</h3>
                        <p>服务描述</p>
                    </div>
                    <div class="service-card">
                        <h3>服务3</h3>
                        <p>服务描述</p>
                    </div>
                </div>
            </div>
        </section>

        <!-- 联系部分 -->
        <section id="contact" class="contact">
            <div class="container">
                <h2 class="section-title">联系我们</h2>
                <div class="contact-content">
                    <div class="contact-info">
                        <h3>联系信息</h3>
                        <p>联系方式</p>
                    </div>
                    <div class="contact-form">
                        <form>
                            <div class="form-group">
                                <input type="text" placeholder="姓名" required>
                            </div>
                            <div class="form-group">
                                <input type="email" placeholder="邮箱" required>
                            </div>
                            <div class="form-group">
                                <textarea placeholder="消息" rows="5" required></textarea>
                            </div>
                            <button type="submit" class="btn btn-primary">发送消息</button>
                        </form>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <!-- 页脚 -->
    <footer class="footer">
        <div class="container">
            <p>&copy; 2024 网站名称. 保留所有权利.</p>
        </div>
    </footer>

    <!-- JavaScript -->
    <script src="script.js"></script>
</body>
</html>
